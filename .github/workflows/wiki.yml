name: Update Wiki

on:
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - 'pkgs/**'
      - 'hosts/**'
      - 'hardware/**'
      - 'flake.nix'
      - 'scripts/generate-wiki.sh'
  workflow_dispatch:

jobs:
  wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate wiki content
        run: bash scripts/generate-wiki.sh > Home.md

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update wiki
        run: |
          cp Home.md wiki/Home.md
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Home.md
          git diff --staged --quiet || git commit -m "docs: update wiki [skip ci]"
          git push
