name: build

on:
  push:
  workflow_dispatch:

jobs:
  build-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: easimon/maximize-build-space@v10
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          build-mount-path: "/nix"

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: ang3lo
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check if build needed
        id: check
        run: |
          nix build .#nixosConfigurations.pc-angelo.config.system.build.toplevel \
            --dry-run 2>&1 | tee dry-run-output
          grep -q 'will be built' dry-run-output \
            && echo "needed=true" >> "$GITHUB_OUTPUT" \
            || echo "needed=false" >> "$GITHUB_OUTPUT"

      - name: Build system
        if: steps.check.outputs.needed == 'true'
        run: |
          nix build .#nixosConfigurations.pc-angelo.config.system.build.toplevel

  build-packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - angr-management
          - archi
          - nuvio-desktop
          - registry-spy
          - rem
          - dnspy
          - ctfd-parser
          - ese-database-view
          - libesedb
          - libfsntfs
          - sidr
          - scrollmpris
          - monkeylauncher
          - nordvpn
          - linoffice
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: ang3lo
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check if build needed
        id: check
        run: |
          nix build .#packages.x86_64-linux.${{ matrix.package }} \
            --dry-run 2>&1 | tee dry-run-output
          grep -q 'will be built' dry-run-output \
            && echo "needed=true" >> "$GITHUB_OUTPUT" \
            || echo "needed=false" >> "$GITHUB_OUTPUT"

      - name: Build package
        if: steps.check.outputs.needed == 'true'
        run: nix build .#packages.x86_64-linux.${{ matrix.package }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: ang3lo
          skipPush: true

      - name: Lint
        run: nix build .#checks.x86_64-linux.pre-commit-check
